<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamNote</title>
    <link rel="stylesheet" href="../frontend/styles.css">
</head>

<body>
    <header>
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 20px;">
            <h1 style="margin: 0;">StreamNote</h1>
            <div id="currentSessionDisplay" style="flex: 1; font-size: 0.95em; opacity: 0.9;"></div>
        </div>
    </header>

    <div class="container">

        <!-- Session Management Panel -->
        <div class="session-panel">
            <div class="session-header">
                <h3>Sessions</h3>
                <button id="newSessionBtn" class="btn-icon" title="New Session">+</button>
                <button id="manageSessionBtn" class="btn-icon" title="Manage Sessions">⚙</button>
                <button id="toggleSessionPanel" class="btn-icon toggle-btn" title="Toggle Panel">◀</button>
                <!-- Manage Menu -->
                <div id="manageMenu" class="manage-menu" style="display: none;">
                    <button id="exportCurrentBtn" class="manage-menu-item">📄 Export Current Session</button>
                    <button id="exportAllBtn" class="manage-menu-item">📦 Export All Sessions</button>
                    <button id="importBtn" class="manage-menu-item">📥 Import Sessions</button>
                    <button id="clearAllBtn" class="manage-menu-item danger">🗑️ Clear All Data</button>
                </div>
            </div>
            <div class="session-list" id="sessionList">
                <!-- Sessions will be rendered here -->
            </div>
            <div class="current-session-info">
                <input type="text" id="sessionNameInput" placeholder="Session name..." />
            </div>

            <input type="file" id="importFileInput" accept=".json" style="display: none;" />
        </div>

        <div class="main-wrapper">
            <div class="control-panel">
                <button id="openSessionPanel" class="open-session-btn" title="Open Sessions" style="display: none;">📋
                    Sessions</button>
                <button id="startBtn" class="btn btn-primary">Start Recording</button>
                <button id="stopBtn" class="btn btn-danger" disabled>Stop Recording</button>
                <button id="clearBtn" class="btn btn-secondary">Clear</button>

                <div class="spacer"></div>

                <!-- Quick Access Buttons for Side Panel Tabs -->
                <div class="panel-controls">
                    <button id="quickAccessKeywords" class="btn btn-secondary" title="Keywords">📌 Keywords</button>
                    <button id="quickAccessHistory" class="btn btn-secondary" title="History">📜 History</button>
                    <button id="quickAccessSettings" class="btn btn-secondary" title="Settings">⚙️ Settings</button>
                </div>
            </div>

            <div class="content-wrapper">
                <div class="main-content">
                    <div class="transcription-section">
                        <div class="transcript-container">
                            <h2>Transcription</h2>
                            <div id="transcript" class="transcript">
                                <p class="placeholder">Press "Start Recording" to begin...</p>
                            </div>
                        </div>

                        <div class="translation-container">
                            <h2>Translation</h2>
                            <div id="translation" class="translation">
                                <p class="placeholder">Translation will appear here...</p>
                            </div>
                        </div>

                        <!-- Floating Auto Scroll Button -->
                        <button id="floatingAutoScrollBtn" class="floating-auto-scroll-btn"
                            title="Click to jump to latest">
                            ↓ Back to Latest
                        </button>
                    </div>
                </div>

                <!-- Collapsible Side Panels -->
                <div class="side-panels-container">
                    <!-- Side Panel Header -->
                    <div class="side-panel-header">
                        <h3 id="sidePanelTitle">Keywords</h3>
                        <button id="closeSidePanelBtn" class="btn-icon toggle-btn" title="Close Panel">✕</button>
                    </div>

                    <!-- Keywords Content -->
                    <div id="keywordsContent" class="panel-content active">
                        <div id="keywords-display" class="keywords-display">
                            <p class="placeholder">Select text to add keywords...</p>
                        </div>
                        <!-- Text Selection Menu for Adding Keywords -->
                        <div id="textSelectionMenu" class="text-selection-menu" style="display: none;">
                            <button id="explainSelectedTextBtn" class="menu-item">💡 Explain</button>
                            <button id="addSelectedAsKeywordBtn" class="menu-item">+ Add as Keyword</button>
                        </div>
                        <div
                            style="padding: 8px 12px; background: #f8f9fa; border-top: 1px solid #e9ecef; margin-top: auto;">
                            <button id="autoExtractKeywordsBtn" class="btn-icon"
                                title="Auto extract keywords">🔄</button>
                        </div>
                    </div>

                    <!-- History Content -->
                    <div id="historyContent" class="panel-content">
                        <div id="query-history-list" class="query-history-list">
                            <p class="placeholder">No queries yet</p>
                        </div>
                    </div>

                    <!-- Settings Content -->
                    <div id="settingsContent" class="panel-content">
                        <div class="settings-group">
                            <label class="settings-label">
                                <input type="checkbox" id="keyword-toggle" checked>
                                <span>Enable Keywords</span>
                            </label>
                        </div>

                        <div class="settings-group">
                            <label class="settings-label" for="keyword-intensity">Keyword Intensity:</label>
                            <div class="slider-container">
                                <input type="range" id="keyword-intensity" min="1" max="10" value="5"
                                    class="intensity-slider">
                                <span id="intensity-value">5</span>
                            </div>
                        </div>

                        <div class="settings-group">
                            <label class="settings-label">
                                <input type="checkbox" id="translation-toggle" checked>
                                <span>Enable Translation</span>
                            </label>
                        </div>

                        <div class="settings-group">
                            <label class="settings-label" for="target-language">Target Language:</label>
                            <select id="target-language" class="language-selector">
                                <option value="Chinese">中文</option>
                                <option value="English">English</option>
                                <option value="Spanish">Español</option>
                                <option value="French">Français</option>
                                <option value="Japanese">日本語</option>
                                <option value="Korean">한국어</option>
                            </select>
                        </div>

                        <div class="settings-group">
                            <label class="settings-label">
                                <input type="checkbox" id="show-only-translation">
                                <span>Show Only Translation</span>
                            </label>
                        </div>

                        <div class="settings-divider"></div>

                        <div class="settings-group">
                            <label class="settings-label" for="keyword-explanation-language">Keyword Explanation
                                Language:</label>
                            <select id="keyword-explanation-language" class="language-selector">
                                <option value="original">Original (English)</option>
                                <option value="Chinese">中文</option>
                                <option value="Spanish">Español</option>
                                <option value="French">Français</option>
                                <option value="Japanese">日本語</option>
                                <option value="Korean">한국어</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="status-bar">
                <span id="status">Ready</span>
                <span id="recording-indicator" class="recording-indicator" style="display: none;">🔴 Recording in
                    <strong id="recording-session-name"></strong></span>
                <span id="duration">Duration: 0:00</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="../frontend/sessionManager.js"></script>
    <script src="../frontend/keywordExtractor.js"></script>
    <script src="../frontend/app.js"></script>
</body>

</html>
