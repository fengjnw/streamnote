<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamNote - 实时转录原型</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>StreamNote</h1>
            <p class="subtitle">实时课堂转录系统 - 最小原型</p>
        </header>

        <main>
            <div class="controls">
                <button id="startBtn" class="btn btn-primary">开始转录</button>
                <button id="stopBtn" class="btn btn-secondary" disabled>停止转录</button>
                <span id="status" class="status">就绪</span>
            </div>

            <div class="transcript-container">
                <div id="transcript" class="transcript">
                    <p class="placeholder">点击"开始转录"按钮开始...</p>
                </div>
            </div>
        </main>

        <footer>
            <p class="info">
                <span id="wordCount">词数: 0</span> |
                <span id="sessionTime">时长: 00:00</span>
            </p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
